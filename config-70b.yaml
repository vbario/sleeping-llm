# Sleeping LLM — 70B on H100 (Vast.ai)

model:
  backend: "torch"
  path: "meta-llama/Llama-3.1-70B-Instruct"
  # 4-bit quantization fits 70B in ~40GB VRAM (single H100 80GB)
  quantize: "4bit"
  max_tokens: 512
  temperature: 0.7
  top_p: 0.9
  repetition_penalty: 1.1

context:
  max_tokens: 8192
  compaction_threshold: 0.8
  system_prompt: "You may recall things from previous conversations."

sleep:
  manual_trigger: "/sleep"
  trigger_mode: "health"

  curation:
    min_novelty_score: 0.0
    min_importance_score: 0.0
    min_combined_score: 0.0

  firewall:
    min_grounding_score: 0.3
    use_model_verification: false

  maintenance:
    degraded_threshold: 0.5
    max_ppl_increase: 0.15
    max_refresh_per_cycle: 10
    nap_audit_count: 5

memit:
  enabled: false

lora:
  enabled: true
  num_layers: 16
  learning_rate: 5.0e-5
  iters_per_fact: 15
  batch_size: 1

consolidation:
  enabled: true
  scale_schedule: [1.0, 0.5, 0.1, 0.0]

micro_sleep:
  enabled: true
  trigger_mode: "cycle"
  cycle_seconds: 5400
  priority_threshold: 0.7
  max_facts: 5
  iters: 30
  cooldown_seconds: 120
  min_age_seconds: 60

spaced_repetition:
  min_retrain_age_seconds: 3600

health:
  nap_threshold: 0.4
  sleep_threshold: 0.8
  edit_weight: 0.6
  time_weight: 0.3
  perplexity_weight: 0.1
  perplexity_check_interval: 10
  max_wake_seconds: 7200

consolidation_moment:
  enabled: true
  max_buffer_size: 20
  overflow_policy: "consolidate"
  min_buffer_age_seconds: 0
  min_facts: 1

  surprise:
    threshold: 0.6
    novelty_weight: 0.5
    marker_weight: 0.3
    ppl_weight: 0.2
    use_ppl: false
    ppl_ema_alpha: 0.3

nap:
  manual_trigger: "/nap"

validation:
  min_score_ratio: 0.5
  num_questions: 5

paths:
  conversations: "data/conversations"
  core_identity: "data/core_identity"
  benchmarks: "data/benchmarks"
  memit_data: "data/memit"
  memit_ledger: "data/memit/ledger.json"
  adapters: "data/adapters"
  fused_models: "models/fused"
